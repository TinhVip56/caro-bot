<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caro AI Pro Max</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

h1{
    margin-top:15px;
}

#board{
    display:grid;
    grid-template-columns:repeat(20,32px);
    justify-content:center;
    gap:2px;
    margin:20px auto;
}

.cell{
    width:32px;
    height:32px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
    user-select:none;
}

.cell:hover{
    background:#333;
}

#status{
    font-size:22px;
    margin:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#00bfff;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>Caro AI Pro Max</h1>

<div id="status">Bạn là X</div>

<button onclick="restartGame()">Chơi lại</button>

<div id="board"></div>

<script>

const SIZE = 20;

let board = [];

let gameOver = false;

const HUMAN = "X";
const AI = "O";

const boardDiv =
document.getElementById("board");

const statusDiv =
document.getElementById("status");

function initBoard(){

    board = [];
    boardDiv.innerHTML = "";

    for(let y=0;y<SIZE;y++){

        board[y] = [];

        for(let x=0;x<SIZE;x++){

            board[y][x] = "";

            const cell =
            document.createElement("div");

            cell.className = "cell";

            cell.dataset.x = x;
            cell.dataset.y = y;

            cell.onclick = ()=>humanMove(x,y);

            boardDiv.appendChild(cell);
        }
    }

    gameOver = false;

    statusDiv.innerHTML =
    "Bạn là X";
}

function renderBoard(){

    const cells =
    document.querySelectorAll(".cell");

    cells.forEach(cell=>{

        const x =
        parseInt(cell.dataset.x);

        const y =
        parseInt(cell.dataset.y);

        cell.textContent =
        board[y][x];

        if(board[y][x] === "X"){

            cell.style.color =
            "#00bfff";

        }else if(board[y][x] === "O"){

            cell.style.color =
            "#ff4444";
        }
    });
}

function humanMove(x,y){

    if(gameOver) return;

    if(board[y][x] !== "") return;

    board[y][x] = HUMAN;

    renderBoard();

    if(checkWinner(x,y,HUMAN)){

        statusDiv.innerHTML =
        "Bạn thắng 😲";

        gameOver = true;

        return;
    }

    statusDiv.innerHTML =
    "AI đang suy nghĩ...";

    setTimeout(aiMove,150);
}

function aiMove(){

    if(gameOver) return;

    let bestScore = -Infinity;

    let bestMove = null;

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            if(board[y][x] !== "") continue;

            // AI thử đánh
            board[y][x] = AI;

            let aiScore =
            evaluatePosition(x,y,AI);

            // Người thử đánh
            board[y][x] = HUMAN;

            let humanScore =
            evaluatePosition(x,y,HUMAN);

            // reset
            board[y][x] = "";

            // ƯU TIÊN CHẶN CỰC MẠNH
            let totalScore =
            aiScore +
            humanScore * 3;

            // ưu tiên trung tâm
            totalScore +=
            20 - (
                Math.abs(x - SIZE/2) +
                Math.abs(y - SIZE/2)
            );

            if(totalScore > bestScore){

                bestScore = totalScore;

                bestMove = {x,y};
            }
        }
    }

    if(bestMove){

        board[bestMove.y][bestMove.x] = AI;

        renderBoard();

        if(
            checkWinner(
                bestMove.x,
                bestMove.y,
                AI
            )
        ){

            statusDiv.innerHTML =
            "AI thắng 💀";

            gameOver = true;

            return;
        }
    }

    statusDiv.innerHTML =
    "Lượt của bạn";
}

function evaluatePosition(x,y,player){

    const dirs = [
        [1,0],
        [0,1],
        [1,1],
        [1,-1]
    ];

    let total = 0;

    for(let [dx,dy] of dirs){

        let count = 1;

        let open = 0;

        // tiến
        let nx = x + dx;
        let ny = y + dy;

        while(
            nx >= 0 &&
            ny >= 0 &&
            nx < SIZE &&
            ny < SIZE &&
            board[ny][nx] === player
        ){

            count++;

            nx += dx;
            ny += dy;
        }

        if(
            nx >= 0 &&
            ny >= 0 &&
            nx < SIZE &&
            ny < SIZE &&
            board[ny][nx] === ""
        ){
            open++;
        }

        // lùi
        nx = x - dx;
        ny = y - dy;

        while(
            nx >= 0 &&
            ny >= 0 &&
            nx < SIZE &&
            ny < SIZE &&
            board[ny][nx] === player
        ){

            count++;

            nx -= dx;
            ny -= dy;
        }

        if(
            nx >= 0 &&
            ny >= 0 &&
            nx < SIZE &&
            ny < SIZE &&
            board[ny][nx] === ""
        ){
            open++;
        }

        total += getAdvancedScore(count,open);
    }

    return total;
}

function getAdvancedScore(count,open){

    if(count >= 5)
    return 99999999;

    if(count === 4){

        if(open === 2)
        return 1000000;

        if(open === 1)
        return 100000;
    }

    if(count === 3){

        if(open === 2)
        return 50000;

        if(open === 1)
        return 5000;
    }

    if(count === 2){

        if(open === 2)
        return 1000;

        if(open === 1)
        return 100;
    }

    return 10;
}

function checkWinner(x,y,symbol){

    const dirs = [
        [1,0],
        [0,1],
        [1,1],
        [1,-1]
    ];

    for(let [dx,dy] of dirs){

        let count = 1;

        count += countDir(x,y,dx,dy,symbol);

        count += countDir(x,y,-dx,-dy,symbol);

        if(count >= 5){

            return true;
        }
    }

    return false;
}

function countDir(x,y,dx,dy,symbol){

    let count = 0;

    let nx = x + dx;
    let ny = y + dy;

    while(
        nx >= 0 &&
        ny >= 0 &&
        nx < SIZE &&
        ny < SIZE &&
        board[ny][nx] === symbol
    ){

        count++;

        nx += dx;
        ny += dy;
    }

    return count;
}

function restartGame(){

    initBoard();

    renderBoard();
}

initBoard();

renderBoard();

</script>

</body>
</html>
